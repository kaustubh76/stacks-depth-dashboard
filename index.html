<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stacks Depth · Mission Control</title>
    <meta
      name="description"
      content="How much can actually move on Stacks DeFi? A measured market-structure instrument — depth, slippage, and data-quality across ALEX, Velar, and Bitflow."
    />
    <meta name="theme-color" content="#0f131a" />
    <!-- Inline SVG favicon: teal/green depth bars on the dark canvas -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f131a'/%3E%3Crect x='6' y='19' width='4' height='7' rx='1' fill='%2338b2c4'/%3E%3Crect x='13' y='13' width='4' height='13' rx='1' fill='%2343b581'/%3E%3Crect x='20' y='7' width='4' height='19' rx='1' fill='%2338b2c4'/%3E%3C/svg%3E"
    />
    <!-- Social / Open Graph + Twitter card -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Stacks Depth — how much can actually move on Stacks DeFi?" />
    <meta
      property="og:description"
      content="A live, interactive market-structure instrument: drag-to-explore slippage depth, a $-size calculator, and a slippage-budget verdict — over a reproducible on-chain snapshot."
    />
    <meta property="og:url" content="https://stacks-depth-dashboard.onrender.com/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Stacks Depth — market-structure instrument" />
    <meta
      name="twitter:description"
      content="Drag-to-explore slippage depth, a $-size calculator, and a live slippage-budget verdict across ALEX, Velar & Bitflow."
    />
    <!-- Set the theme before first paint (no flash of wrong theme). Mirrors hooks/useTheme.ts. -->
    <script>
      (function () {
        try {
          var q = new URLSearchParams(location.search).get("theme");
          var s = localStorage.getItem("sd.theme");
          var t = q === "light" || q === "dark" ? q
            : s === "light" || s === "dark" ? s
            : (window.matchMedia && matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
